<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Vendas Exclusiva - ECONYX</title>
    <style>
        /* 
           CSS ESTRUTURAL
           Otimizado para vídeo VERTICAL (Portrait) para preencher a tela no mobile.
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* 
           VSL EM TELA CHEIA:
           Agora usa aspect-ratio 9/16 para se adaptar ao vídeo vertical.
        */
        #vsl-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .vsl-container {
            position: relative;
            width: 100%;
            height: 100%;
            /* No desktop, limitamos a proporção para não esticar demais */
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .vsl-container {
                height: 90vh;
                aspect-ratio: 9/16;
            }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
            /* As interações são feitas via overlay */
            aspect-ratio: 9/16;
            object-fit: cover;
        }

        /* OVERLAY DE CONTROLE CUSTOMIZADO: Apenas Play/Pause */
        #video-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #play-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 153, 0.9);
            border-radius: 50%;
            display: none;
            /* Só mostra quando pausado */
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 255, 153, 0.5);
        }

        #play-icon svg {
            width: 40px;
            height: 40px;
            fill: #000;
            margin-left: 5px;
        }

        /* PÁGINA DE VENDAS */
        #sales-page {
            display: none;
            padding-bottom: 100px;
            background-color: #050505;
        }

        .hero {
            padding: 80px 20px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            color: #00ff99;
            margin-bottom: 24px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .cta-button {
            display: inline-block;
            background: #00ff99;
            color: #000;
            padding: 20px 45px;
            font-weight: 900;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(0, 255, 153, 0.35);
        }

        /* ELEMENTO DE "AO VIVO" */
        .live-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            pointer-events: none;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ff99;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .live-badge span {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>

    <!-- VSL INICIAL -->
    <div id="vsl-overlay">
        <div class="vsl-container">
            <div class="live-badge">
                <div class="dot"></div>
                <span>APRESENTAÇÃO OFICIAL</span>
            </div>

            <!-- Vídeo sem controles nativos -->
            <iframe id="vimeo-player"
                src="https://player.vimeo.com/video/1171209632?autoplay=1&controls=0&badge=0&autopause=0"
                allow="autoplay; fullscreen" title="VSL Principal">
            </iframe>

            <!-- Overlay de controle -->
            <div id="video-controls">
                <div id="play-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO DE VENDAS -->
    <div id="sales-page">
        <section class="hero">
            <h1>O Segredo da ECONYX Revelado</h1>
            <a href="#" class="cta-button">QUERO MINHA LIBERDADE AGORA</a>
        </section>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const overlay = document.getElementById('vsl-overlay');
        const salesPage = document.getElementById('sales-page');
        const iframe = document.getElementById('vimeo-player');
        const controls = document.getElementById('video-controls');
        const playIcon = document.getElementById('play-icon');

        const player = new Vimeo.Player(iframe);
        let isPlaying = false;
        let needsInteraction = false;
        let finished = false;

        function finalizarPagina() {
            if (finished) return;
            finished = true;
            salesPage.style.display = 'block';
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
            console.log('Página liberada instantaneamente aos 1:24.');
        }

        player.on('timeupdate', function (data) {
            if (data.seconds >= 84) {
                finalizarPagina();
            }
        });

        player.on('ended', finalizarPagina);

        player.ready().then(function () {
            player.setVolume(1);
            player.setMuted(false);

            player.play().then(() => {
                isPlaying = true;
                playIcon.style.display = 'none';
            }).catch(() => {
                needsInteraction = true;
                isPlaying = false;
                playIcon.style.display = 'flex';

                // Aviso visual discreto
                const badge = document.querySelector('.live-badge');
                if (badge) {
                    badge.innerHTML = '<div class="dot"></div><span>CLIQUE PARA ATIVAR O SOM</span>';
                    badge.style.background = 'rgba(0, 255, 153, 0.2)';
                }
            });
        });

        // Alternar Play/Pause ao clicar ou ativar som
        controls.addEventListener('click', () => {
            if (needsInteraction) {
                player.setVolume(1);
                player.setMuted(false);
                player.play();
                needsInteraction = false;
                isPlaying = true;
                playIcon.style.display = 'none';
                return;
            }

            if (isPlaying) {
                player.pause();
                playIcon.style.display = 'flex';
                isPlaying = false;
            } else {
                player.play();
                playIcon.style.display = 'none';
                isPlaying = true;
            }
        });
    </script>
</body>

</html>
